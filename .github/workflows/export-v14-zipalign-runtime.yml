name: Export v14 zipalign runtime

on:
  pull_request:

permissions:
  contents: read

jobs:
  export-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Locate zipalign runtime
        shell: bash
        run: |
          set -euo pipefail
          latest="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          runtime="$(find "$latest" -type f -name 'libc++.so' -print -quit)"
          test -n "$runtime"
          mkdir -p export
          cp "$runtime" export/libc++.so
          printf '%s\n' "$runtime" > export/runtime-path.txt

      - name: Upload runtime
        uses: actions/upload-artifact@v4
        with:
          name: v14-zipalign-runtime
          path: export
          if-no-files-found: error
          retention-days: 1
