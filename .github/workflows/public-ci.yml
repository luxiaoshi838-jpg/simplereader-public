name: Public Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - agent/v14-real-epub-chm-continuous
  pull_request:

permissions:
  contents: read

jobs:
  build-debug:
    name: Build public debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout v14 branch source
        uses: actions/checkout@v4
        with:
          ref: agent/v14-real-epub-chm-continuous

      - name: Pack exact branch source
        run: tar --exclude=.git --exclude='app/build' --exclude='.gradle' -czf /tmp/simplereader-v14-branch-source.tar.gz .

      - name: Upload exact branch source
        uses: actions/upload-artifact@v4
        with:
          name: simplereader-v14-branch-source-${{ github.run_number }}
          path: /tmp/simplereader-v14-branch-source.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew clean assembleDebug --stacktrace --console=plain

      - name: Upload public debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleReader-public-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
