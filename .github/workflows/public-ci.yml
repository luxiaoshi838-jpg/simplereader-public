name: Public Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - agent/v14-real-epub-chm-continuous
  pull_request:

permissions:
  contents: read

jobs:
  build-debug:
    name: Build public debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout v14 branch source
        uses: actions/checkout@v4
        with:
          ref: agent/v14-real-epub-chm-continuous

      - name: Pack exact branch source
        run: tar --exclude=.git --exclude='app/build' --exclude='.gradle' -czf /tmp/simplereader-v14-branch-source.tar.gz .

      - name: Upload exact branch source
        uses: actions/upload-artifact@v4
        with:
          name: simplereader-v14-branch-source-${{ github.run_number }}
          path: /tmp/simplereader-v14-branch-source.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Export official Android signing tools
        shell: bash
        run: |
          set -euo pipefail
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          test -x "$build_tools/apksigner"
          test -x "$build_tools/zipalign"
          test -x "$build_tools/aapt2"
          tar -C "$(dirname "$build_tools")" -czf /tmp/android-build-tools.tar.gz "$(basename "$build_tools")"

      - name: Upload Android signing tools
        uses: actions/upload-artifact@v4
        with:
          name: Android-build-tools-${{ github.run_number }}
          path: /tmp/android-build-tools.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Build debug APK
        shell: bash
        run: |
          chmod +x ./gradlew
          timeout --signal=INT 5m ./gradlew clean assembleDebug --stacktrace --console=plain

      - name: Upload public debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleReader-public-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
