name: v14 EPUB hotfix validation

on:
  push:
    branches:
      - agent/v14-epub-open-group-cover-fix
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: agent/v14-epub-open-group-cover-fix
          fetch-depth: 0

      - name: Apply EPUB and group-cover hotfix
        run: python scripts/apply_v14_epub_hotfix.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Debug unit tests
        run: timeout 5m ./gradlew --no-daemon testDebugUnitTest

      - name: Release unit tests
        run: timeout 5m ./gradlew --no-daemon testReleaseUnitTest

      - name: Assemble debug
        run: timeout 5m ./gradlew --no-daemon assembleDebug

      - name: Assemble release
        run: timeout 5m ./gradlew --no-daemon assembleRelease

      - name: Commit verified hotfix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A app/src/main/java/com/simplereader/app/ui/ReaderActivity.kt app/src/main/java/com/simplereader/app/ui/GroupBooksActivity.kt
          if git diff --cached --quiet; then
            echo 'No source changes to commit'
          else
            git commit -m 'Fix EPUB opening and grouped shelf covers'
            git push origin HEAD:agent/v14-epub-open-group-cover-fix
          fi

      - name: Upload verified APKs
        uses: actions/upload-artifact@v4
        with:
          name: SimpleReader-v14-epub-hotfix-${{ github.run_number }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error
