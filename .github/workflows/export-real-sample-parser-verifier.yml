name: Export real sample parser verifier

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-verifier:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Create standalone verifier
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verifier/src/main/java
          cat > verifier/settings.gradle <<'EOF'
          pluginManagement { repositories { gradlePluginPortal(); mavenCentral() } }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { mavenCentral(); maven { url 'https://jitpack.io' } }
          }
          rootProject.name = 'real-sample-verifier'
          EOF
          cat > verifier/build.gradle <<'EOF'
          plugins { id 'java'; id 'application' }
          java { toolchain { languageVersion = JavaLanguageVersion.of(17) } }
          dependencies {
            implementation 'io.documentnode:epub4j-core:4.2.3'
            implementation 'com.github.chimenchen:jchmlib:v0.5.4'
            implementation 'com.github.albfernandez:juniversalchardet:2.5.0'
            implementation 'org.jsoup:jsoup:1.18.3'
          }
          application { mainClass = 'Verifier' }
          tasks.named('jar') {
            manifest { attributes 'Main-Class': 'Verifier' }
            duplicatesStrategy = DuplicatesStrategy.EXCLUDE
            from { configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) } }
          }
          EOF
          cat > verifier/src/main/java/Verifier.java <<'EOF'
          import io.documentnode.epub4j.domain.Book;
          import io.documentnode.epub4j.domain.Resource;
          import io.documentnode.epub4j.epub.EpubReader;
          import org.jchmlib.ChmFile;
          import org.jchmlib.ChmTopicsTree;
          import org.jchmlib.ChmUnitInfo;
          import org.mozilla.universalchardet.UniversalDetector;
          import org.jsoup.Jsoup;
          import java.io.*;
          import java.nio.*;
          import java.nio.charset.*;
          import java.nio.file.*;
          import java.util.*;
          import java.util.regex.*;

          public class Verifier {
            static final long MAX_ENTRY = 8L * 1024 * 1024;
            static final Pattern META1 = Pattern.compile("(?is)<meta[^>]+charset\\s*=\\s*[\\\"']?\\s*([A-Za-z0-9._-]+)");
            static final Pattern META2 = Pattern.compile("(?is)content\\s*=\\s*[\\\"'][^\\\"']*charset\\s*=\\s*([A-Za-z0-9._-]+)");
            static final Pattern DOCWRITE = Pattern.compile("(?is)document\\.write(?:ln)?\\s*\\(\\s*(?:\"((?:\\\\.|[^\"\\\\])*)\"|'((?:\\\\.|[^'\\\\])*)')\\s*\\)");

            public static void main(String[] args) throws Exception {
              if (args.length != 2) throw new IllegalArgumentException("usage: epub|chm file");
              if (args[0].equals("epub")) verifyEpub(new File(args[1])); else verifyChm(new File(args[1]));
            }

            static void verifyEpub(File file) throws Exception {
              long start = System.nanoTime();
              Book book;
              try (InputStream in = new BufferedInputStream(new FileInputStream(file))) { book = new EpubReader().readEpub(in); }
              Resource cover = book.getCoverImage();
              byte[] coverBytes = cover == null ? null : cover.getData();
              List<Resource> resources = new ArrayList<>();
              book.getSpine().getSpineReferences().forEach(ref -> {
                Resource r = ref.getResource();
                if (r != null && readable(r.getHref())) resources.add(r);
              });
              long total = 0; int empty = 0, replacement = 0, mojibake = 0; List<String> titles = new ArrayList<>();
              for (Resource r: resources) {
                String html;
                try (Reader reader = r.getReader()) { html = readAll(reader); }
                String text = Jsoup.parse(html).text();
                total += text.length();
                if (text.isBlank()) empty++;
                replacement += count(text, '\uFFFD');
                if (text.contains("锟斤拷")) mojibake++;
                String title = r.getTitle();
                if (title == null || title.isBlank()) title = Jsoup.parse(html).title();
                if (title == null || title.isBlank()) title = r.getHref();
                titles.add(title);
              }
              System.out.println("TYPE=EPUB");
              System.out.println("SPINE="+resources.size());
              System.out.println("COVER_BYTES="+(coverBytes==null?0:coverBytes.length));
              System.out.println("TOTAL_TEXT_CHARS="+total);
              System.out.println("EMPTY_CHAPTERS="+empty);
              System.out.println("REPLACEMENT_CHARS="+replacement);
              System.out.println("MOJIBAKE_CHAPTERS="+mojibake);
              System.out.println("FIRST_TITLES="+String.join(" | ", titles.subList(0, Math.min(8,titles.size()))));
              System.out.println("LAST_TITLES="+String.join(" | ", titles.subList(Math.max(0,titles.size()-5), titles.size())));
              System.out.println("ELAPSED_MS="+((System.nanoTime()-start)/1_000_000));
            }

            static void verifyChm(File file) throws Exception {
              long start = System.nanoTime();
              ChmFile archive = new ChmFile(file.getAbsolutePath());
              List<Node> nodes = new ArrayList<>();
              walk(archive, archive.getTopicsTree(), 0, nodes);
              int readable = 0, sections = 0, maxDepth = 0, empty = 0, bad = 0, failures = 0;
              long total = 0; List<String> top = new ArrayList<>(); List<String> sample = new ArrayList<>();
              Set<String> seen = new LinkedHashSet<>();
              for (Node n: nodes) {
                maxDepth = Math.max(maxDepth, n.depth);
                if (n.depth == 0 && n.title != null && !n.title.isBlank()) top.add(n.title);
                String p = normalize(n.path);
                ChmUnitInfo entry = null;
                if (readable(p)) {
                  entry = archive.resolveObject(p);
                  if (entry == null && p.startsWith("/")) entry = archive.resolveObject(p.substring(1));
                }
                if (entry == null || entry.getLength() <= 0 || entry.getLength() > MAX_ENTRY) { sections++; continue; }
                if (!seen.add(entry.getPath().toLowerCase(Locale.ROOT))) continue;
                readable++;
                try {
                  ByteBuffer buf = archive.retrieveObject(entry);
                  byte[] bytes = bytes(buf);
                  String decoded = decode(bytes, archive.getEncoding());
                  String text = extract(decoded);
                  total += text.length();
                  if (text.isBlank()) empty++;
                  if (text.indexOf('\uFFFD')>=0 || text.contains("锟斤拷")) bad++;
                  if (sample.size()<12) sample.add(n.depth+":"+safe(n.title)+":"+text.substring(0,Math.min(50,text.length())).replace('\n',' '));
                } catch (Throwable t) { failures++; }
              }
              System.out.println("TYPE=CHM");
              System.out.println("TREE_NODES="+nodes.size());
              System.out.println("READABLE_CHAPTERS="+readable);
              System.out.println("SECTION_NODES="+sections);
              System.out.println("MAX_DEPTH="+maxDepth);
              System.out.println("TOP_LEVEL_COUNT="+top.size());
              System.out.println("TOP_LEVEL_TITLES="+String.join(" | ", top.subList(0,Math.min(30,top.size()))));
              System.out.println("TOTAL_TEXT_CHARS="+total);
              System.out.println("EMPTY_CHAPTERS="+empty);
              System.out.println("BAD_ENCODING_CHAPTERS="+bad);
              System.out.println("READ_FAILURES="+failures);
              System.out.println("SAMPLES="+String.join(" || ",sample));
              System.out.println("ELAPSED_MS="+((System.nanoTime()-start)/1_000_000));
            }

            static void walk(ChmFile a, ChmTopicsTree node, int depth, List<Node> out) {
              if (node == null || node.getChildren() == null) return;
              for (ChmTopicsTree child: node.getChildren()) {
                out.add(new Node(child.getPath(), child.getTitle(), depth));
                walk(a, child, depth+1, out);
              }
            }
            record Node(String path,String title,int depth){}
            static String normalize(String v){ if(v==null)return ""; v=v.split("[#?]",2)[0].replace('\\','/').trim(); return v.isBlank()?"":(v.startsWith("/")?v:"/"+v); }
            static boolean readable(String p){ String x=p.toLowerCase(Locale.ROOT); return !x.isBlank()&&!x.startsWith("/#")&&!x.startsWith("/$")&&!x.startsWith("::")&&(x.endsWith(".htm")||x.endsWith(".html")||x.endsWith(".xhtml")||x.endsWith(".txt")); }
            static boolean readableHref(String p){return readable(p);}
            static boolean readable(String href, boolean dummy){return readable(href);}
            static boolean readableHref2(String href){return readable(href);}
            static boolean readableResource(String href){return readable(href);}
            static boolean readablePath(String href){return readable(href);}
            static boolean readableExt(String href){return readable(href);}
            static boolean readableDoc(String href){return readable(href);}
            static boolean readableEpub(String href){ String x=href==null?"":href.toLowerCase(Locale.ROOT); return x.endsWith(".xhtml")||x.endsWith(".html")||x.endsWith(".htm"); }
            static boolean readable(String href){ return readableEpub(href); }
            static String readAll(Reader r)throws IOException{StringBuilder b=new StringBuilder();char[] c=new char[8192];for(int n;(n=r.read(c))>=0;)b.append(c,0,n);return b.toString();}
            static int count(String s,char c){int n=0;for(int i=0;i<s.length();i++)if(s.charAt(i)==c)n++;return n;}
            static String safe(String s){return s==null?"":s.replace('\n',' ');}
            static byte[] bytes(ByteBuffer b){ByteBuffer c=b.duplicate();c.rewind();byte[] x=new byte[c.remaining()];c.get(x);return x;}

            static String decode(byte[] bytes,String archiveEncoding){
              LinkedHashSet<Charset> cs=new LinkedHashSet<>();
              String head=new String(bytes,0,Math.min(bytes.length,16384),StandardCharsets.ISO_8859_1);
              for(Pattern p:List.of(META1,META2)){Matcher m=p.matcher(head);if(m.find()) add(cs,m.group(1));}
              add(cs,archiveEncoding);
              UniversalDetector d=new UniversalDetector(null);d.handleData(bytes,0,bytes.length);d.dataEnd();add(cs,d.getDetectedCharset());
              add(cs,"UTF-8");add(cs,"GB18030");add(cs,"Big5");
              String best=null;long bestScore=Long.MIN_VALUE;
              for(Charset c:cs){try{String s=c.newDecoder().onMalformedInput(CodingErrorAction.REPORT).onUnmappableCharacter(CodingErrorAction.REPORT).decode(ByteBuffer.wrap(bytes)).toString();long q=quality(s);if(q>bestScore){best=s;bestScore=q;}}catch(Exception ignored){}}
              return best!=null?best:new String(bytes,Charset.forName("GB18030"));
            }
            static void add(Set<Charset>s,String n){if(n==null||n.isBlank())return;String x=n.trim();if(List.of("GB2312","HZ-GB-2312","GBK","CP936","WINDOWS-936").contains(x.toUpperCase(Locale.ROOT)))x="GB18030";if(x.equalsIgnoreCase("UTF8"))x="UTF-8";try{s.add(Charset.forName(x));}catch(Exception ignored){}}
            static long quality(String s){long q=0;for(int i=0;i<s.length();i++){char c=s.charAt(i);if(c=='\uFFFD')q-=1000;else if(c==0)q-=200;else if(c<32&&"\n\r\t".indexOf(c)<0)q-=100;else if(Character.UnicodeScript.of(c)==Character.UnicodeScript.HAN)q+=8;else if(Character.isLetterOrDigit(c))q+=3;else if(Character.isWhitespace(c))q+=1;}if(s.contains("锟斤拷"))q-=5000;return q;}
            static String extract(String source){
              Matcher m=DOCWRITE.matcher(source);List<String> writes=new ArrayList<>();while(m.find())writes.add(unescape(m.group(1)!=null?m.group(1):m.group(2)));
              String s=writes.isEmpty()?source.replaceAll("(?is)<script\\b[^>]*>.*?</script>","").replaceAll("(?is)<style\\b[^>]*>.*?</style>","").replaceAll("(?is)<head\\b[^>]*>.*?</head>",""):String.join("\n",writes);
              return Jsoup.parse(s).text().replace('\u00A0',' ').trim();
            }
            static String unescape(String s){StringBuilder o=new StringBuilder();for(int i=0;i<s.length();i++){char c=s.charAt(i);if(c!='\\'||i+1>=s.length()){o.append(c);continue;}char e=s.charAt(++i);switch(e){case'n'->o.append('\n');case'r'->o.append('\r');case't'->o.append('\t');case'\\'->o.append('\\');case'\''->o.append('\'');case'\"'->o.append('\"');default->o.append(e);}}return o.toString();}
          }
          EOF

      - name: Build fat jar
        run: ./gradlew -p verifier clean jar --stacktrace --console=plain

      - uses: actions/upload-artifact@v4
        with:
          name: real-sample-parser-verifier
          path: verifier/build/libs/*.jar
          if-no-files-found: error
          retention-days: 1
