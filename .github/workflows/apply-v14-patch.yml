name: Apply and verify v14 real-file fixes

on:
  push:
    branches:
      - agent/v14-real-epub-chm-continuous
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, 'Apply v14 verified changes') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SIMPLE_READER_VERSION_CODE: "2026072314"
      SIMPLE_READER_VERSION_NAME: "2026.07.23.real-epub-chm-continuous.1"
      EXPECTED_PATCH_SHA256: "9af1266dc0e92e27ccc75b5eece361b47b80d1688902333cbaaecd8068525104"
      EXPECTED_BASE64_SHA256: "73465f56265da220a402d75a35c1a00f33af1fe95373bf8f9a228cffbb4765d7"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v14-real-epub-chm-continuous
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode and verify reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "Expected local chunks:"
            echo "patch00 4500 495da7a4d09572f6ee34c5617f51ef2d539c70d2ff3c59767ddb3b918781da43"
            echo "patch01 4500 cf9b5e538b21965e9c9ecb69c0f7702c830f702e386ed7ac867894f0346f4ad2"
            echo "patch02 4500 ec2ce878c4413d9c9dd6fb97bbbbf1a5f801546f94c64dd2c646a8e90c62beda"
            echo "patch03 3360 aef80a4c5e1487bac380d2202ab0506be36b9ac9388f45fa7904772277204be4"
            echo "Actual repository chunks:"
            wc -c .v14/patch00 .v14/patch01 .v14/patch02 .v14/patch03
            sha256sum .v14/patch00 .v14/patch01 .v14/patch02 .v14/patch03
          } | tee v14-chunk-diagnostics.txt
          cat .v14/patch00 .v14/patch01 .v14/patch02 .v14/patch03 \
            | tr -d '\r\n\t ' > "$RUNNER_TEMP/v14.patch.gz.b64"
          encoded_actual="$(sha256sum "$RUNNER_TEMP/v14.patch.gz.b64" | awk '{print $1}')"
          echo "combined base64 sha256=$encoded_actual" | tee -a v14-chunk-diagnostics.txt
          test "$encoded_actual" = "$EXPECTED_BASE64_SHA256"
          base64 --decode "$RUNNER_TEMP/v14.patch.gz.b64" \
            | gzip --decompress > "$RUNNER_TEMP/v14.patch"
          actual="$(sha256sum "$RUNNER_TEMP/v14.patch" | awk '{print $1}')"
          echo "decoded patch sha256=$actual" | tee -a v14-chunk-diagnostics.txt
          test "$actual" = "$EXPECTED_PATCH_SHA256"
          git apply --check "$RUNNER_TEMP/v14.patch"
          git apply "$RUNNER_TEMP/v14.patch"

      - name: Run unit tests and Debug Release builds
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew clean testDebugUnitTest testReleaseUnitTest assembleDebug assembleRelease --stacktrace --console=plain 2>&1 | tee v14-gradle-build.log

      - name: Verify v14 source contracts
        shell: bash
        run: |
          set -euo pipefail
          grep -Fq 'fun readCoverImage' app/src/main/java/com/simplereader/app/parser/EpubParser.kt
          grep -Fq 'book.coverImage' app/src/main/java/com/simplereader/app/parser/EpubParser.kt
          grep -Fq 'archive.retrieveObject(entry)' app/src/main/java/com/simplereader/app/parser/ChmParser.kt
          grep -Fq 'GB18030' app/src/main/java/com/simplereader/app/parser/ChmParser.kt
          grep -Fq 'StructuredReadingBuffer' app/src/main/java/com/simplereader/app/ui/ReaderActivity.kt
          grep -Fq 'EpubParser.readCoverImage' app/src/main/java/com/simplereader/app/ui/MainActivity.kt
          ! grep -Fq 'retrieveObjectAsString(entry)' app/src/main/java/com/simplereader/app/parser/ChmParser.kt
          ! grep -Fq 'offset = Int.MAX_VALUE' app/src/main/java/com/simplereader/app/ui/ReaderActivity.kt
          test -s app/build/outputs/apk/release/app-release-unsigned.apk -o -s app/build/outputs/apk/release/app-release.apk

      - name: Commit verified source changes
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/src/main/java/com/simplereader/app/parser/ChmParser.kt \
            app/src/main/java/com/simplereader/app/parser/EpubParser.kt \
            app/src/main/java/com/simplereader/app/ui/MainActivity.kt \
            app/src/main/java/com/simplereader/app/ui/ReaderActivity.kt \
            app/src/main/java/com/simplereader/app/ui/StructuredReadingBuffer.kt \
            app/src/test/java/com/simplereader/app/parser/ChmParserEncodingTest.kt \
            app/src/test/java/com/simplereader/app/parser/EpubParserTest.kt \
            app/src/test/java/com/simplereader/app/parser/RealSampleRegressionContractTest.kt \
            app/src/test/java/com/simplereader/app/ui/StructuredReadingBufferTest.kt
          git commit -m "Apply v14 verified changes"
          git push origin HEAD:agent/v14-real-epub-chm-continuous

      - name: Upload v14 diagnostics and APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SimpleReader_v14_build_${{ github.run_number }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/reports/tests/
            v14-gradle-build.log
            v14-chunk-diagnostics.txt
          if-no-files-found: warn
          retention-days: 7
