name: Apply reviewed Mihon migration

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/mihon-style-backup-local-library'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/mihon-style-backup-local-library
          fetch-depth: 0

      - name: Detect reviewed patch
        id: patch
        shell: bash
        run: |
          if compgen -G 'tools/mihon_migration/part*' > /dev/null; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.patch.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        if: steps.patch.outputs.present == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Record remote chunk checksums
        if: steps.patch.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          wc -c tools/mihon_migration/part* | tee chunk-diagnostics.txt
          sha256sum tools/mihon_migration/part* | tee -a chunk-diagnostics.txt
          {
            head -c 7000 tools/mihon_migration/part00
            cat tools/mihon_migration/part01 tools/mihon_migration/part02 \
              tools/mihon_migration/part03 tools/mihon_migration/part04 \
              tools/mihon_migration/part05 tools/mihon_migration/part06 \
              tools/mihon_migration/part07
          } > concatenated-patch.b64

      - name: Upload chunk diagnostics
        if: steps.patch.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mihon-chunk-diagnostics-${{ github.run_number }}
          path: |
            chunk-diagnostics.txt
            concatenated-patch.b64
          if-no-files-found: error
          retention-days: 1

      - name: Reconstruct reviewed patch
        if: steps.patch.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          base64 -d concatenated-patch.b64 | gzip -d > mihon.patch
          sha256sum mihon.patch | tee mihon.patch.sha256
          echo 'ab35426777bb7d86fbe6f97bb05193387050078fe6660b99d8f97da732ba9397  mihon.patch' | sha256sum --check

      - name: Apply reviewed patch
        if: steps.patch.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          patch -p1 --forward < mihon.patch
          rm -rf tools/mihon_migration concatenated-patch.b64 chunk-diagnostics.txt mihon.patch mihon.patch.sha256
          chmod +x ./gradlew

      - name: Test and build direct source
        if: steps.patch.outputs.present == 'true'
        shell: bash
        run: |
          set -o pipefail
          export SIMPLE_READER_VERSION_CODE=$((2026300000 + 10#$GITHUB_RUN_NUMBER))
          export SIMPLE_READER_VERSION_NAME=2026.07.22.mihon.${GITHUB_RUN_NUMBER}
          ./gradlew clean testDebugUnitTest testReleaseUnitTest assembleDebug assembleRelease --stacktrace --console=plain 2>&1 | tee mihon-build.log

      - name: Upload build diagnostics
        if: always() && steps.patch.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mihon-build-diagnostics-${{ github.run_number }}
          path: |
            mihon-build.log
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: warn
          retention-days: 2

      - name: Verify build does not rewrite business source
        if: steps.patch.outputs.present == 'true' && success()
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- app/src/main app/build.gradle.kts settings.gradle.kts

      - name: Commit verified direct source
        if: steps.patch.outputs.present == 'true' && success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git restore --staged .github/workflows/apply-mihon-migration.yml || true
          git restore .github/workflows/apply-mihon-migration.yml || true
          git restore --staged .github/workflows/export-source-snapshot.yml || true
          git restore .github/workflows/export-source-snapshot.yml || true
          git commit -m 'Adopt Mihon backup and local library patterns'
          git push origin HEAD:agent/mihon-style-backup-local-library
