name: Apply reviewed Mihon migration

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/mihon-style-backup-local-library'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/mihon-style-backup-local-library
          fetch-depth: 0

      - name: Detect reviewed patch
        id: patch
        shell: bash
        run: |
          if compgen -G 'tools/mihon_migration/part*' > /dev/null; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.patch.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        if: steps.patch.outputs.present == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Reconstruct reviewed patch
        if: steps.patch.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          {
            head -c 7000 tools/mihon_migration/part00
            cat tools/mihon_migration/part01 tools/mihon_migration/part02 \
              tools/mihon_migration/part03 tools/mihon_migration/part04 \
              tools/mihon_migration/part05 tools/mihon_migration/part06 \
              tools/mihon_migration/part07
          } > concatenated-patch.b64
          base64 -d concatenated-patch.b64 | gzip -d > mihon.patch
          echo 'ab35426777bb7d86fbe6f97bb05193387050078fe6660b99d8f97da732ba9397  mihon.patch' | sha256sum --check

      - name: Apply and stage reviewed patch
        if: steps.patch.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          patch -p1 --forward < mihon.patch
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/com/simplereader/app/data/backup/LocalLibraryScanner.kt')
          lines = path.read_text(encoding='utf-8').splitlines()
          txt_index = next(
              (i for i, line in enumerate(lines) if '.removeSuffixIgnoreCase(".txt")' in line),
              None,
          )
          if txt_index is None or txt_index < 2:
              raise SystemExit('LocalLibraryScanner title suffix chain not found')
          if 'val title: String' not in lines[txt_index - 2] or 'get() = displayName' not in lines[txt_index - 1]:
              raise SystemExit('Unexpected LocalLibraryScanner title block')
          lines[txt_index - 2:txt_index + 3] = [
              '        val title: String',
              "            get() = displayName.substringBeforeLast('.', displayName)",
          ]
          extension_index = next(
              (i for i, line in enumerate(lines) if 'private fun String.removeSuffixIgnoreCase' in line),
              None,
          )
          if extension_index is not None:
              del lines[extension_index:extension_index + 2]
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          rm -rf tools/mihon_migration concatenated-patch.b64 mihon.patch
          chmod +x ./gradlew
          git add -A

      - name: Test and build direct source
        if: steps.patch.outputs.present == 'true'
        shell: bash
        run: |
          set -o pipefail
          export SIMPLE_READER_VERSION_CODE=$((2026300000 + 10#$GITHUB_RUN_NUMBER))
          export SIMPLE_READER_VERSION_NAME=2026.07.22.mihon.${GITHUB_RUN_NUMBER}
          ./gradlew clean testDebugUnitTest testReleaseUnitTest assembleDebug assembleRelease --stacktrace --console=plain 2>&1 | tee mihon-build.log

      - name: Upload build diagnostics
        if: always() && steps.patch.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mihon-build-diagnostics-${{ github.run_number }}
          path: |
            mihon-build.log
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: warn
          retention-days: 2

      - name: Verify build adds no source rewrites
        if: steps.patch.outputs.present == 'true' && success()
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- app/src/main app/build.gradle.kts settings.gradle.kts

      - name: Commit verified direct source
        if: steps.patch.outputs.present == 'true' && success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git restore --staged .github/workflows/apply-mihon-migration.yml || true
          git restore .github/workflows/apply-mihon-migration.yml || true
          git restore --staged .github/workflows/export-source-snapshot.yml || true
          git restore .github/workflows/export-source-snapshot.yml || true
          git add -A
          git commit -m 'Adopt Mihon backup and local library patterns'
          git push origin HEAD:agent/mihon-style-backup-local-library
