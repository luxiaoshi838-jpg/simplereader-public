name: Integrate stable source and complete restore flow

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: integrate-stable-source
  cancel-in-progress: true

jobs:
  integrate:
    if: github.head_ref == 'agent/complete-backup-group-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/complete-backup-group-fix
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Materialize current build-time patches
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:preBuild --stacktrace --console=plain

      - name: Integrate stable source
        run: python3 tools/integrate_stable_source.py

      - name: Verify tests, release build and immutable source
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew clean testDebugUnitTest testReleaseUnitTest assembleDebug assembleRelease --stacktrace --console=plain
          git diff -- app/src/main app/scripts app/build.gradle.kts settings.gradle.kts > post-build-source.diff
          test ! -s post-build-source.diff

      - name: Remove one-time integration files
        run: |
          rm -f tools/integrate_stable_source.py
          rm -f .github/workflows/export-transformed-source.yml

      - name: Commit integrated source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Stabilize groups and one-step backup relinking"
          git push origin HEAD:agent/complete-backup-group-fix
