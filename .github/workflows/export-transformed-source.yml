name: Integrate stable source and complete restore flow

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: integrate-stable-source
  cancel-in-progress: true

jobs:
  integrate:
    if: github.head_ref == 'agent/complete-backup-group-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/complete-backup-group-fix
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Materialize current build-time patches
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:preBuild --stacktrace --console=plain

      - name: Integrate and stage stable source
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/integrate_stable_source.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('app/scripts/feature_scroll_chm_export.gradle.kts')
          source = path.read_text(encoding='utf-8')
          start_marker = '        val chmMarker = "                            else -> LoadedContent(\\"\\")"'
          end_marker = '        if (!readerSource.contains("private fun readChmTextIsolated(")) {'
          start = source.find(start_marker)
          end = source.find(end_marker, start + 1)
          if start < 0 or end <= start:
              raise SystemExit('CHM patch section not found')
          replacement = '''        val chmMarker = "                            else -> LoadedContent(\\"\\")"
          val chmBranch = """                            "CHM" -> LoadedContent(
                                      text = readChmTextIsolated(input)
                                  )
          """
          if (!readerSource.contains("\\"CHM\\" -> LoadedContent(")) {
              check(readerSource.contains(chmMarker)) { "无法接入隔离式 CHM 阅读解析器" }
              readerSource = readerSource.replace(chmMarker, chmBranch + chmMarker)
          }

          '''.replace('          ', '')
          path.write_text(source[:start] + replacement + source[end:], encoding='utf-8')
          PY
          git add -A

      - name: Run tests and release build
        shell: bash
        run: |
          set -o pipefail
          ./gradlew clean testDebugUnitTest testReleaseUnitTest assembleDebug assembleRelease --stacktrace --console=plain 2>&1 | tee integration-build.log

      - name: Verify build adds no new source rewrites
        shell: bash
        run: |
          set -euo pipefail
          git diff -- app/src/main app/scripts app/build.gradle.kts settings.gradle.kts | tee post-build-source.diff
          test ! -s post-build-source.diff

      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stable-source-integration-diagnostics-${{ github.run_number }}
          path: |
            integration-build.log
            post-build-source.diff
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: warn
          retention-days: 2

      - name: Remove one-time integration script
        run: rm -f tools/integrate_stable_source.py

      - name: Commit integrated application source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git restore --staged .github/workflows/android-pr-validation.yml || true
          git restore .github/workflows/android-pr-validation.yml || true
          git add -A
          git commit -m "Stabilize groups and one-step backup relinking"
          git push origin HEAD:agent/complete-backup-group-fix
