name: Export transformed source snapshot

on:
  push:
    branches:
      - agent/complete-backup-group-fix
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply all current source patches
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:preBuild --stacktrace --console=plain
          git status --short | tee transformed-status.txt
          git diff --name-only | tee transformed-files.txt
          git diff -- app/src app/build.gradle.kts settings.gradle.kts > transformed-source.patch
          mkdir -p transformed-source
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            mkdir -p "transformed-source/$(dirname "$file")"
            cp "$file" "transformed-source/$file"
          done < transformed-files.txt

      - name: Upload transformed source
        uses: actions/upload-artifact@v4
        with:
          name: transformed-source-snapshot
          path: |
            transformed-status.txt
            transformed-files.txt
            transformed-source.patch
            transformed-source/
          if-no-files-found: error
          retention-days: 1
