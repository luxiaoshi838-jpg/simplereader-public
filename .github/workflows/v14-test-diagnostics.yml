name: Capture v14 unit test diagnostics

on:
  push:
    branches:
      - agent/v14-real-epub-chm-continuous
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v14-real-epub-chm-continuous
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew clean testDebugUnitTest testReleaseUnitTest --stacktrace --console=plain 2>&1 | tee v14-test.log
      - name: Upload complete test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-unit-test-diagnostics-${{ github.run_number }}
          path: |
            v14-test.log
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: warn
          retention-days: 7
