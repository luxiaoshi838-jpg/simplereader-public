name: Export source snapshot

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'agent/mihon-style-backup-local-library'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Archive source
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude='*/build' --exclude='*/build/*' -czf "$RUNNER_TEMP/simplereader-source.tar.gz" .
          cp "$RUNNER_TEMP/simplereader-source.tar.gz" simplereader-source.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: simplereader-source-snapshot
          path: simplereader-source.tar.gz
          if-no-files-found: error
          retention-days: 1
