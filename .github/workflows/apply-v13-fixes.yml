name: Apply and verify v13 fixes

on:
  push:
    branches:
      - agent/v13-epub-chm-theme-grid
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && (github.head_ref == 'agent/v13-epub-chm-theme-grid' || github.ref_name == 'agent/v13-epub-chm-theme-grid')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout v13 branch
        uses: actions/checkout@v4
        with:
          ref: agent/v13-epub-chm-theme-grid
          fetch-depth: 0

      - name: Detect pending migration
        id: migration
        shell: bash
        run: |
          if [ -f tools/apply_v13_ui.py ]; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.migration.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        if: steps.migration.outputs.present == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Apply guarded source changes
        if: steps.migration.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/apply_v13_ui.py
          rm -f tools/apply_v13_ui.py
          rm -f .github/workflows/apply-v13-fixes.yml
          rm -f .github/workflows/export-v13-source.yml
          chmod +x ./gradlew
          git add -A

      - name: Test and build v13
        if: steps.migration.outputs.present == 'true'
        shell: bash
        env:
          SIMPLE_READER_VERSION_CODE: '2026300130'
          SIMPLE_READER_VERSION_NAME: 'v13.0'
        run: |
          set -o pipefail
          ./gradlew clean testDebugUnitTest testReleaseUnitTest assembleDebug assembleRelease --stacktrace --console=plain 2>&1 | tee v13-build.log

      - name: Verify build did not rewrite source
        if: steps.migration.outputs.present == 'true' && success()
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- app/src/main app/src/test app/build.gradle.kts settings.gradle.kts THIRD_PARTY_NOTICES.md

      - name: Upload v13 diagnostics and unsigned APKs
        if: always() && steps.migration.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: SimpleReader-v13-build-${{ github.run_number }}
          path: |
            v13-build.log
            app/build/reports/tests/
            app/build/test-results/
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Commit verified source
        if: steps.migration.outputs.present == 'true' && success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Complete v13 structured readers and UI fixes'
          git push origin HEAD:agent/v13-epub-chm-theme-grid
