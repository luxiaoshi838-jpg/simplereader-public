name: Export v14 signing tools PR

on:
  pull_request:

permissions:
  contents: read

jobs:
  export-tools:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Locate current Android build tools
        shell: bash
        run: |
          set -euo pipefail
          latest="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          test -x "$latest/apksigner"
          test -x "$latest/zipalign"
          test -x "$latest/aapt2"
          mkdir -p export/lib
          cp "$latest/apksigner" "$latest/zipalign" "$latest/aapt2" export/
          cp "$latest/lib/apksigner.jar" export/lib/
          printf '%s\n' "$latest" > export/build-tools-path.txt

      - name: Upload official tools
        uses: actions/upload-artifact@v4
        with:
          name: v14-android-signing-tools-pr
          path: export
          if-no-files-found: error
          retention-days: 1
