name: Apply verified v14 continuous-reading patch

on:
  push:
    branches:
      - agent/v14-real-epub-chm-continuous
    paths:
      - ".github/workflows/apply-v14-continuous-patch.yml"

permissions:
  contents: write

concurrency:
  group: apply-v14-continuous-patch
  cancel-in-progress: true

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v14-real-epub-chm-continuous
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Apply patch, test and write report
        shell: bash
        run: |
          set +e
          patch_b64=".github/patches/v14-continuous.patch.gz.b64"
          report=".github/v14-continuous-build-status.md"
          report_tmp="/tmp/v14-continuous-build-status.md"
          : > /tmp/apply.log
          : > /tmp/build.log
          if [ ! -f "$patch_b64" ]; then
            printf '# v14 continuous patch\n\nSTATUS: FAILURE\n\nPatch file is already consumed.\n' > "$report_tmp"
            exit_code=2
          else
            base64 --decode "$patch_b64" | gzip -dc > /tmp/v14-continuous.patch
            patch -p1 --dry-run --batch < /tmp/v14-continuous.patch > /tmp/apply.log 2>&1
            apply_code=$?
            if [ $apply_code -eq 0 ]; then
              patch -p1 --batch < /tmp/v14-continuous.patch >> /tmp/apply.log 2>&1
              chmod +x ./gradlew
              ./gradlew clean testDebugUnitTest testReleaseUnitTest assembleDebug assembleRelease --stacktrace --console=plain > /tmp/build.log 2>&1
              exit_code=$?
            else
              exit_code=$apply_code
            fi
            if [ $exit_code -eq 0 ]; then
              printf '# v14 continuous patch\n\nSTATUS: SUCCESS\n\nAll Debug/Release tests and builds passed.\n' > "$report_tmp"
            else
              printf '# v14 continuous patch\n\nSTATUS: FAILURE\n\nExit code: %s\n\n## Patch output\n```text\n' "$exit_code" > "$report_tmp"
              tail -n 120 /tmp/apply.log >> "$report_tmp"
              printf '\n```\n\n## Build output\n```text\n' >> "$report_tmp"
              tail -n 240 /tmp/build.log >> "$report_tmp"
              printf '\n```\n' >> "$report_tmp"
            fi
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if [ "${exit_code:-2}" -eq 0 ]; then
            cp "$report_tmp" "$report"
            rm -f "$patch_b64"
            git add app/src/main/java app/src/test/java "$patch_b64" "$report"
            git commit -m "Complete v14 continuous TXT and structured cache reading"
          else
            git reset --hard HEAD
            git clean -fd app/src/main/java app/src/test/java
            cp "$report_tmp" "$report"
            git add "$report"
            git commit -m "Report v14 continuous patch verification failure"
          fi
          git push origin HEAD:agent/v14-real-epub-chm-continuous
          exit "${exit_code:-2}"
