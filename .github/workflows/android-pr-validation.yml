name: Android PR validation

on:
  workflow_dispatch:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: write

concurrency:
  group: android-pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Full compile and five-minute staged validation
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout v14 branch
        uses: actions/checkout@v4
        with:
          ref: agent/v14-real-epub-chm-continuous
          fetch-depth: 0

      - name: Apply staged implementation
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          patch_file=.github/patches/v14-continuous.patch.gz.b64
          if [ ! -f "$patch_file" ]; then
            echo "PATCH_APPLIED=0" >> "$GITHUB_ENV"
            exit 0
          fi
          base64 --decode "$patch_file" | gzip -dc > /tmp/v14.patch
          patch -p1 --dry-run --batch < /tmp/v14.patch
          patch -p1 --batch < /tmp/v14.patch
          python3 - <<'PY'
          from pathlib import Path

          parser = Path('app/src/main/java/com/simplereader/app/parser/TxtParser.kt')
          text = parser.read_text(encoding='utf-8')
          old = '''    fun decodeBestEffort(bytes: ByteArray, preferredCharsetName: String? = null): String {
              if (bytes.isEmpty()) return ""
              detectBomCharset(bytes)?.let { charset ->
                  return String(bytes, charset).removePrefix("\\uFEFF")
              }
              val preferred = preferredCharsetName
                  ?.let { runCatching { Charset.forName(normalizeCharsetName(it)) }.getOrNull() }
              val locallyDetected = runCatching { CharsetDetector.detectCharset(bytes) }.getOrNull()
              val candidates = linkedSetOf<Charset>()
              listOfNotNull(locallyDetected, preferred).forEach(candidates::add)
              listOf("UTF-8", "GB18030", "Big5", "windows-1252")
                  .mapNotNull { runCatching { Charset.forName(it) }.getOrNull() }
                  .forEach(candidates::add)

              val decoded = candidates.mapNotNull { charset ->
                  decodeStrict(bytes, charset)?.let { value ->
                      var score = decodedQuality(value)
                      if (locallyDetected?.name().equals(charset.name(), ignoreCase = true)) score += 120
                      if (preferred?.name().equals(charset.name(), ignoreCase = true)) score += 40
                      Triple(score, charset, value)
                  }
              }
              return decoded.maxByOrNull { it.first }?.third
                  ?: String(bytes, preferred ?: Charset.forName("GB18030"))
          }
          '''
          new = '''    fun decodeBestEffort(bytes: ByteArray, preferredCharsetName: String? = null): String {
              if (bytes.isEmpty()) return ""
              detectBomCharset(bytes)?.let { charset ->
                  return String(bytes, charset).removePrefix("\\uFEFF")
              }
              decodeStrict(bytes, Charsets.UTF_8)?.let { utf8 ->
                  if (!looksMojibake(utf8)) return utf8
              }
              val preferred = preferredCharsetName
                  ?.let { runCatching { Charset.forName(normalizeCharsetName(it)) }.getOrNull() }
              val locallyDetected = runCatching { CharsetDetector.detectCharset(bytes) }.getOrNull()
              val candidates = linkedSetOf<Charset>()
              listOfNotNull(locallyDetected, preferred).forEach(candidates::add)
              listOf("GB18030", "Big5", "windows-1252")
                  .mapNotNull { runCatching { Charset.forName(it) }.getOrNull() }
                  .forEach(candidates::add)
              val decoded = candidates.mapNotNull { charset ->
                  decodeStrict(bytes, charset)?.let { value ->
                      var score = normalizedDecodedQuality(value)
                      if (locallyDetected?.name().equals(charset.name(), ignoreCase = true)) score += 100_000L
                      if (preferred?.name().equals(charset.name(), ignoreCase = true)) score += 10_000L
                      Triple(score, charset, value)
                  }
              }
              return decoded.maxByOrNull { it.first }?.third
                  ?: String(bytes, preferred ?: Charset.forName("GB18030"))
          }
          '''
          if old not in text:
              raise SystemExit('decodeBestEffort anchor missing')
          text = text.replace(old, new, 1)
          marker = '    private fun decodedQuality(text: String): Long {\n'
          helpers = '''    private val commonSimplifiedChineseCharacters: Set<Char> by lazy {
              "的一是在不了有和人这中大为上个国我以要他时来用们生到作地于出就分对成会可主发年动同工也能下过子说产种面而方后多定行学法所民得经十三之进着等部度家电力里如水化高自二理起小物现实加量都两体制机当使点从业本去把性好应开它合还因由其些然前外天政四日那社义事平形相全表间样与关各重新线内数正心反你明看原又么利比或但质气第向道命此变条只没结解问意建月公无系军很情者最立代想已通并提直题程展五果料象员革位入常文总次品式活设及管特件长求老头基资边流路级少图山统接知较将组见计别她手角期根论运农指几九区强放决西被干做必战先回则任取据处理世车价育口更标保治尔找文末乱码假装到达继续阅读章节正文".toSet()
          }

              private fun normalizedDecodedQuality(text: String): Long {
                  if (text.isEmpty()) return Long.MIN_VALUE / 4
                  return decodedQuality(text) * 1000L / text.length.coerceAtLeast(1)
              }

              private fun looksMojibake(text: String): Boolean {
                  if (text.contains('\\uFFFD') || text.contains('\\u0000')) return true
                  if (text.any { it.code in 0x3100..0x312F || it.code in 0xFE30..0xFE4F }) return true
                  return listOf("锟斤拷", "烫烫烫", "屯屯屯", "娴嬭瘯", "鐨勭", "鏂囨湰")
                      .any(text::contains)
              }

          '''
          if marker not in text:
              raise SystemExit('decodedQuality marker missing')
          text = text.replace(marker, helpers + marker, 1)
          text = text.replace(
              '''                Character.UnicodeScript.of(char.code) == Character.UnicodeScript.HAN -> 12L
                          char.code in 0x80..0xFF -> -6L
          ''',
              '''                char.code in 0x3100..0x312F -> -400L
                          char.code in 0xFE30..0xFE4F -> -300L
                          Character.UnicodeScript.of(char.code) == Character.UnicodeScript.HAN ->
                              if (char in commonSimplifiedChineseCharacters) 24L else 8L
                          char.code in 0x80..0xFF -> -6L
          ''',
              1
          )
          parser.write_text(text, encoding='utf-8')

          reader = Path('app/src/main/java/com/simplereader/app/ui/ReaderActivity.kt')
          text = reader.read_text(encoding='utf-8')
          old = '''        currentPosition = if (txtStreamingMode) {
                      loadedContent.txtTargetByte
                          .coerceIn(loadedContent.txtStartByte, loadedContent.txtNextByte)
                          .coerceAtMost(Int.MAX_VALUE.toLong())
                          .toInt()
                  } else when (format.uppercase()) {
                      "TXT" -> progress?.txtCharOffset ?: progress?.position?.toIntOrNull()
                      "EPUB", "CHM" -> loadedContent.structuredInitialPosition
                      else -> progress?.position?.toIntOrNull()
                  }?.coerceIn(0, currentContent.length) ?: 0
          '''
          new = '''        currentPosition = if (txtStreamingMode) {
                      loadedContent.txtTargetByte
                          .coerceIn(loadedContent.txtStartByte, loadedContent.txtNextByte)
                          .coerceAtMost(Int.MAX_VALUE.toLong())
                          .toInt()
                  } else {
                      val restoredPosition = when (format.uppercase()) {
                          "TXT" -> progress?.txtCharOffset ?: progress?.position?.toIntOrNull()
                          "EPUB", "CHM" -> loadedContent.structuredInitialPosition
                          else -> progress?.position?.toIntOrNull()
                      } ?: 0
                      restoredPosition.coerceIn(0, currentContent.length)
                  }
          '''
          if old not in text:
              raise SystemExit('TXT restored-position anchor missing')
          text = text.replace(old, new, 1)
          text = text.replace(
              '''        txtBufferLoadJob?.cancel()
                  lifecycleScope.launch {
          ''',
              '''        txtBufferLoadJob?.cancel()
                  txtBufferLoadJob = lifecycleScope.launch {
          ''',
              1
          )
          reader.write_text(text, encoding='utf-8')

          test = Path('app/src/test/java/com/simplereader/app/parser/TxtContinuousReadingTest.kt')
          text = test.read_text(encoding='utf-8')
          text = text.replace(
              '''        val raw = ByteArrayOutputStream().apply {
                      repeat(900) { index ->
          ''',
              '''        val expected = StringBuilder()
                  val raw = ByteArrayOutputStream().apply {
                      repeat(900) { index ->
          ''',
              1
          )
          text = text.replace(
              '''                write(line.toByteArray(if (index % 7 == 0 && index % 11 != 0) gb else utf8))
          ''',
              '''                expected.append(line)
                          write(line.toByteArray(if (index % 7 == 0 && index % 11 != 0) gb else utf8))
          ''',
              1
          )
          text = text.replace(
              '''        assertTrue(text.contains("第0章 UTF-8正文"))
          ''',
              '''        assertEquals(expected.toString(), text)
                  assertTrue(text.contains("第0章 UTF-8正文"))
          ''',
              1
          )
          test.write_text(text, encoding='utf-8')
          PY
          echo "PATCH_APPLIED=1" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare test version
        shell: bash
        run: |
          chmod +x ./gradlew
          echo "SIMPLE_READER_VERSION_CODE=$((2026300000 + 10#$GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "SIMPLE_READER_VERSION_NAME=2026.07.24.v14.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Debug unit tests
        run: timeout --signal=INT 5m ./gradlew clean testDebugUnitTest --stacktrace --console=plain

      - name: Release unit tests
        run: timeout --signal=INT 5m ./gradlew testReleaseUnitTest --stacktrace --console=plain

      - name: Assemble debug
        run: timeout --signal=INT 5m ./gradlew assembleDebug --stacktrace --console=plain

      - name: Assemble release
        run: timeout --signal=INT 5m ./gradlew assembleRelease --stacktrace --console=plain

      - name: Commit verified implementation
        if: env.PATCH_APPLIED == '1'
        shell: bash
        run: |
          set -euo pipefail
          printf '# v14 continuous patch\n\nSTATUS: SUCCESS\n\nAll Gradle stages completed within five minutes each.\n' > .github/v14-continuous-build-status.md
          rm -f .github/patches/v14-continuous.patch.gz.b64
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/src/main/java app/src/test/java .github/patches/v14-continuous.patch.gz.b64 .github/v14-continuous-build-status.md
          git commit -m "Complete v14 continuous TXT and structured cache reading"
          git push origin HEAD:agent/v14-real-epub-chm-continuous

      - name: Verify clean source
        run: git diff --exit-code -- app/src/main app/src/test app/build.gradle.kts settings.gradle.kts

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: SimpleReader-v14-verified-${{ github.run_number }}
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7
