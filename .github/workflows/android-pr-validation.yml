name: Android PR validation

on:
  workflow_dispatch:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: write

concurrency:
  group: android-pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Five-minute staged v14 validation
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout v14 branch
        uses: actions/checkout@v4
        with:
          ref: agent/v14-real-epub-chm-continuous
          fetch-depth: 0

      - name: Apply current incremental implementation
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          if [ -f .github/patches/v14-inc-00.b64 ]; then
            cat .github/patches/v14-inc-0{0..5}.b64 > /tmp/v14-inc.b64
            base64 --decode /tmp/v14-inc.b64 | gzip -dc > /tmp/v14-inc.patch
            git apply --check /tmp/v14-inc.patch
            git apply /tmp/v14-inc.patch
            base64 --decode .github/patches/v14-fix1.b64 | gzip -dc > /tmp/v14-fix1.patch
            git apply --check /tmp/v14-fix1.patch
            git apply /tmp/v14-fix1.patch
            echo "PATCH_APPLIED=1" >> "$GITHUB_ENV"
          else
            echo "PATCH_APPLIED=0" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare v14 version
        shell: bash
        run: |
          echo "SIMPLE_READER_VERSION_CODE=$((2026072400 + 10#$GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "SIMPLE_READER_VERSION_NAME=2026.07.24.v14.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Debug unit tests
        shell: bash
        run: |
          set +e
          timeout --signal=INT 5m ./gradlew clean testDebugUnitTest --stacktrace --console=plain > /tmp/debug-unit.log 2>&1
          code=$?
          tail -n 180 /tmp/debug-unit.log
          exit $code

      - name: Release unit tests
        shell: bash
        run: |
          set +e
          timeout --signal=INT 5m ./gradlew testReleaseUnitTest --stacktrace --console=plain > /tmp/release-unit.log 2>&1
          code=$?
          tail -n 180 /tmp/release-unit.log
          exit $code

      - name: Assemble debug
        shell: bash
        run: |
          set +e
          timeout --signal=INT 5m ./gradlew assembleDebug --stacktrace --console=plain > /tmp/assemble-debug.log 2>&1
          code=$?
          tail -n 180 /tmp/assemble-debug.log
          exit $code

      - name: Assemble release
        shell: bash
        run: |
          set +e
          timeout --signal=INT 5m ./gradlew assembleRelease --stacktrace --console=plain > /tmp/assemble-release.log 2>&1
          code=$?
          tail -n 180 /tmp/assemble-release.log
          exit $code

      - name: Commit verified v14 implementation
        if: env.PATCH_APPLIED == '1'
        shell: bash
        run: |
          set -euo pipefail
          printf '# v14 continuous reading\n\nSTATUS: SUCCESS\n\nDebug tests, release tests, debug build and release build each completed within five minutes.\n' > .github/v14-continuous-build-status.md
          rm -f .github/patches/v14-inc-0{0..5}.b64
          rm -f .github/patches/v14-fix1.b64
          rm -f .github/patches/v14-continuous.patch.gz.b64
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/src/main app/src/test .github/patches .github/v14-continuous-build-status.md
          git commit -m "Complete v14 continuous TXT and structured cache reading"
          git push origin HEAD:agent/v14-real-epub-chm-continuous

      - name: Verify clean working tree
        run: git diff --exit-code && test -z "$(git status --porcelain)"

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SimpleReader-v14-validation-logs-${{ github.run_number }}
          path: |
            /tmp/*-unit.log
            /tmp/assemble-*.log
            app/build/reports/tests
          if-no-files-found: warn
          retention-days: 2

      - name: Upload verified APKs
        uses: actions/upload-artifact@v4
        with:
          name: SimpleReader-v14-verified-${{ github.run_number }}
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7
