name: Android PR validation

on:
  workflow_dispatch:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

concurrency:
  group: android-pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Full compile, tests and immutable-source check
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Pack source snapshot
        run: tar --exclude=.git --exclude='app/build' --exclude='.gradle' -czf /tmp/simplereader-v14-source.tar.gz .

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: simplereader-v14-source-${{ github.run_number }}
          path: /tmp/simplereader-v14-source.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare version
        shell: bash
        run: |
          chmod +x ./gradlew
          echo "SIMPLE_READER_VERSION_CODE=$((2026300000 + 10#$GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "SIMPLE_READER_VERSION_NAME=2026.07.22.complete.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Debug unit tests
        run: timeout --signal=INT 5m ./gradlew clean testDebugUnitTest --stacktrace --console=plain

      - name: Release unit tests
        run: timeout --signal=INT 5m ./gradlew testReleaseUnitTest --stacktrace --console=plain

      - name: Assemble debug
        run: timeout --signal=INT 5m ./gradlew assembleDebug --stacktrace --console=plain

      - name: Assemble release
        run: timeout --signal=INT 5m ./gradlew assembleRelease --stacktrace --console=plain

      - name: Verify immutable source
        run: git diff --exit-code -- app/src/main app/scripts app/build.gradle.kts settings.gradle.kts

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: SimpleReader-complete-fix-${{ github.run_number }}
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7
