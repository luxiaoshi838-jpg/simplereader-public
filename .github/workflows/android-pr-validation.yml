name: Android PR validation

on:
  workflow_dispatch:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: write

concurrency:
  group: android-pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Five-minute EPUB hotfix validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout current hotfix branch
        uses: actions/checkout@v4
        with:
          ref: agent/v14-epub-open-group-cover-fix
          fetch-depth: 0

      - name: Ensure EPUB opening and group cover fix
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          if grep -q 'structuredWholeText' app/src/main/java/com/simplereader/app/ui/ReaderActivity.kt \
            && grep -q 'coverImage' app/src/main/java/com/simplereader/app/ui/GroupBooksActivity.kt; then
            echo 'Hotfix already present'
          else
            python scripts/apply_v14_epub_hotfix.py
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare hotfix version
        shell: bash
        run: |
          echo "SIMPLE_READER_VERSION_CODE=$((2026073200 + 10#$GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "SIMPLE_READER_VERSION_NAME=2026.07.24.v14.hotfix.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Debug unit tests
        shell: bash
        run: |
          set +e
          timeout --signal=INT 5m ./gradlew clean testDebugUnitTest --stacktrace --console=plain > /tmp/debug-unit.log 2>&1
          code=$?
          tail -n 180 /tmp/debug-unit.log
          exit $code

      - name: Release unit tests
        shell: bash
        run: |
          set +e
          timeout --signal=INT 5m ./gradlew testReleaseUnitTest --stacktrace --console=plain > /tmp/release-unit.log 2>&1
          code=$?
          tail -n 180 /tmp/release-unit.log
          exit $code

      - name: Assemble debug
        shell: bash
        run: |
          set +e
          timeout --signal=INT 5m ./gradlew assembleDebug --stacktrace --console=plain > /tmp/assemble-debug.log 2>&1
          code=$?
          tail -n 180 /tmp/assemble-debug.log
          exit $code

      - name: Assemble release
        shell: bash
        run: |
          set +e
          timeout --signal=INT 5m ./gradlew assembleRelease --stacktrace --console=plain > /tmp/assemble-release.log 2>&1
          code=$?
          tail -n 180 /tmp/assemble-release.log
          exit $code

      - name: Upload verified source files
        uses: actions/upload-artifact@v4
        with:
          name: SimpleReader-v14-epub-hotfix-sources-${{ github.run_number }}
          path: |
            app/src/main/java/com/simplereader/app/ui/ReaderActivity.kt
            app/src/main/java/com/simplereader/app/ui/GroupBooksActivity.kt
          if-no-files-found: error
          retention-days: 2

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SimpleReader-v14-epub-hotfix-logs-${{ github.run_number }}
          path: |
            /tmp/*-unit.log
            /tmp/assemble-*.log
            app/build/reports/tests
          if-no-files-found: warn
          retention-days: 2

      - name: Upload verified APKs
        uses: actions/upload-artifact@v4
        with:
          name: SimpleReader-v14-epub-hotfix-${{ github.run_number }}
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7
