name: Export v14 source snapshot

on:
  push:
    branches:
      - agent/v14-real-epub-chm-continuous
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Archive source
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=zip --output="$RUNNER_TEMP/simplereader-v14-source.zip" HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: simplereader-v14-source
          path: ${{ runner.temp }}/simplereader-v14-source.zip
          if-no-files-found: error
