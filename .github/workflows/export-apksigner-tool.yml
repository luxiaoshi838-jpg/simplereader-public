name: Export verified Android signer and unsigned release

on:
  push:
    branches:
      - agent/export-official-apksigner
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build tested unsigned release APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew clean testReleaseUnitTest assembleRelease --stacktrace --console=plain
          find app/build/outputs/apk/release -type f -name '*.apk' -print -exec ls -l {} \;

      - name: Download signer built on Android apksig
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            'https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar' \
            --output uber-apk-signer-1.3.0.jar
          echo 'e1299fd6fcf4da527dd53735b56127e8ea922a321128123b9c32d619bba1d835  uber-apk-signer-1.3.0.jar' | sha256sum --check
          java -jar uber-apk-signer-1.3.0.jar --version

      - name: Export Android SDK parser tools
        shell: bash
        run: |
          set -euo pipefail
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          test -x "$build_tools/aapt2"
          test -x "$build_tools/zipalign"
          mkdir -p android-build-tools
          cp "$build_tools/aapt2" android-build-tools/
          cp "$build_tools/zipalign" android-build-tools/
          cp "$build_tools/apksigner" android-build-tools/
          cp "$build_tools/lib/apksigner.jar" android-build-tools/
          if [ -f "$build_tools/lib64/libc++.so" ]; then
            mkdir -p android-build-tools/lib64
            cp "$build_tools/lib64/libc++.so" android-build-tools/lib64/
          fi
          chmod +x android-build-tools/aapt2 android-build-tools/zipalign android-build-tools/apksigner
          "$build_tools/aapt2" version

      - name: Upload unsigned release and verified tools
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-release-and-android-tools
          path: |
            app/build/outputs/apk/release/*.apk
            uber-apk-signer-1.3.0.jar
            android-build-tools/
          if-no-files-found: error
          retention-days: 1
